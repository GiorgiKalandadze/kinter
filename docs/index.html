<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qinter</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1a1814;
    --text-muted: #9a9590;
    --accent: #2d5a3d;
    --accent-light: #eef4f0;
    --tag-bg: #f0ede8;
    --tag-text: #6b6560;
    --reveal-bg: #fafdf9;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Libre Baskerville', Georgia, serif; font-size: 16px; line-height: 1.6; }

  #app { display: flex; flex-direction: column; min-height: 100vh; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .back-btn {
    display: none; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    color: var(--text-muted); background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .back-btn svg { width: 12px; height: 12px; }
  .back-btn.visible { display: flex; }

  .category-badge {
    display: none; font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 4px 10px; background: var(--accent-light); color: var(--accent);
    border-radius: 20px; letter-spacing: 0.05em;
  }
  .category-badge.visible { display: block; }

  .progress-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .progress-bar { width: 120px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Category screen */
  #category-screen {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    padding: 48px 0; animation: fadeIn 0.3s ease;
  }
  #category-screen h1 { font-size: 1.5rem; font-weight: 400; margin-bottom: 8px; }
  #category-screen p  { font-size: 0.85rem; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 36px; }

  .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }

  .category-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 28px 24px; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .category-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.2s ease;
  }
  .category-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .category-card:hover::after { transform: scaleX(1); }
  .cc-name  { font-size: 1rem; font-weight: 700; color: var(--text); }
  .cc-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }

  .cat-status { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); padding: 12px 0; }
  .cat-error  { font-family: 'DM Mono', monospace; font-size: 12px; color: #c0392b; padding: 8px 12px; background: #fdf0ee; border-radius: 6px; border: 1px solid #f0c0ba; }

  /* Card screen */
  #card-screen { display: none; flex-direction: column; flex: 1; }
  #card-screen.visible { display: flex; }

  #filter-bar { display: flex; gap: 8px; padding: 6px 0; flex-wrap: wrap; flex-shrink: 0; }

  .topic-chip {
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--border); background: var(--surface);
    color: var(--tag-text); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  .topic-chip:hover { border-color: var(--accent); color: var(--accent); }
  .topic-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  #stage { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 12px 0 0; gap: 12px; }

  .card {
    display: grid; grid-template-columns: 1fr 1fr; width: 100%; min-height: 380px;
    border-radius: 12px; border: 1px solid var(--border); background: var(--surface);
    box-shadow: var(--shadow); overflow: hidden; animation: cardIn 0.3s ease;
  }

  .card-question { padding: 48px 44px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; }
  .card-answer   { padding: 48px 44px; background: var(--reveal-bg); display: flex; flex-direction: column; gap: 20px; position: relative; transition: background 0.15s; }
  .card-answer.tap-to-reveal { cursor: pointer; }
  .card-answer.tap-to-reveal:hover { background: #f5fbf7; }

  .panel-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .panel-body  { font-size: 1.05rem; line-height: 1.75; color: var(--text); flex: 1; }
  .panel-body.blurred { filter: blur(6px); user-select: none; transition: filter 0.35s ease; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag  { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 9px; background: var(--tag-bg); color: var(--tag-text); border-radius: 4px; letter-spacing: 0.04em; }

  .reveal-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
    padding: 10px 22px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .reveal-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 2px 8px rgba(45,90,61,0.12); }

  .answer-footer { display: flex; justify-content: flex-end; }
  .detail-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
    padding: 4px 12px; background: none; border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    visibility: hidden;
  }
  .detail-btn:hover { border-color: var(--accent); color: var(--accent); }
  .detail-btn.visible { visibility: visible; }
  .detail-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  #controls { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 16px; flex-shrink: 0; }

  .nav-btn {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.06em;
    padding: 10px 20px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn svg { width: 14px; height: 14px; }

  .shuffle-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    color: var(--text-muted); background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: color 0.15s; padding: 8px 4px;
  }
  .shuffle-btn:hover { color: var(--accent); }
  .shuffle-btn svg { width: 13px; height: 13px; }

  #empty { flex: 1; display: none; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-muted); }

  .kbd-hints { display: flex; gap: 16px; justify-content: center; padding-bottom: 20px; flex-shrink: 0; }
  .kbd-hint  { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }
  kbd { display: inline-block; padding: 2px 6px; background: var(--tag-bg); border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--tag-text); }

  @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    #app { padding: 0 16px; }
    .card { grid-template-columns: 1fr; grid-template-rows: auto auto; min-height: 0; }
    .card-question { border-right: none; border-bottom: 1px solid var(--border); padding: 24px 20px; }
    .card-answer { padding: 24px 20px; min-height: 200px; }
    .category-grid { grid-template-columns: 1fr 1fr; }
    .kbd-hints { display: none; }
    .progress-bar { width: 80px; }
  }
  @media (max-width: 400px) { .category-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-left">
      <span class="logo">Qinter</span>
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3L5 8l5 5"/></svg>
        Categories
      </button>
      <span class="category-badge" id="category-badge"></span>
    </div>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <span class="progress-text" id="prog-text">1 / 1</span>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
  </header>

  <div id="category-screen">
    <h1>Choose a category</h1>
    <p>Select a deck to start reviewing</p>
    <div class="category-grid" id="category-grid">
      <span class="cat-status">Loading categories…</span>
    </div>
  </div>

  <div id="card-screen">
    <div id="stage">
      <div class="card" id="card">
        <div class="card-question">
          <span class="panel-label">Question</span>
          <p class="panel-body" id="q-body"></p>
        </div>
        <div class="card-answer" id="card-answer">
          <span class="panel-label">Answer</span>
          <p class="panel-body blurred" id="a-body"></p>
          <div class="answer-footer">
            <button class="detail-btn" id="detail-btn">Show detail</button>
          </div>
          <button class="reveal-btn" id="reveal-btn">Reveal answer</button>
        </div>
      </div>
      <div class="tags" id="q-tags"></div>
      <div id="empty">No cards match the selected topic.</div>
    </div>

    <div id="filter-bar"></div>

    <div id="controls">
      <button class="nav-btn" id="prev-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3L5 8l5 5"/></svg>
        Prev
      </button>
      <button class="shuffle-btn" id="shuffle-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M1 4h3l8 8h3M12 4h3v3M14 7l1-3-3-1M1 12l3-3"/>
        </svg>
        Shuffle
      </button>
      <button class="nav-btn" id="next-btn">
        Next
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3l5 5-5 5"/></svg>
      </button>
    </div>

    <div class="kbd-hints">
      <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> Navigate</span>
      <span class="kbd-hint"><kbd>Space</kbd> Reveal</span>
      <span class="kbd-hint"><kbd>D</kbd> Detail</span>
      <span class="kbd-hint"><kbd>S</kbd> Shuffle</span>
    </div>
  </div>

</div>
<script>
const DATA_FILES = [
  'data/101 - Algorithms.json',
  'data/101 - Cloud and Devops.json',
  'data/101 - JS.json',
  'data/101 - Mongo.json',
  'data/101 - Node.json',
  'data/101 - OS.json',
  'data/101 - PostgreSQL.json',
  'data/101 - System Design.json',
];

let _allData = null;

async function loadAllData() {
  if (_allData) return _allData;
  const arrays = await Promise.all(DATA_FILES.map(f => fetch(f).then(r => r.json())));
  _allData = arrays.flat();
  return _allData;
}

async function getCategories() {
  const data = await loadAllData();
  const counts = {};
  data.forEach(q => {
    if (q.mainCategory) counts[q.mainCategory] = (counts[q.mainCategory] || 0) + 1;
  });
  return Object.entries(counts)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([name, count]) => ({ name, count }));
}

async function getQuestions(category) {
  const data = await loadAllData();
  return (category ? data.filter(q => q.mainCategory === category) : data)
    .map(({ topic, shortDescription, longDescription, tags }) => ({
      topic,
      shortDescription: shortDescription || '',
      longDescription: longDescription || '',
      tags: (tags || []).filter(Boolean)
    }));
}

let allCards = [], filtered = [], index = 0, activeTopics = new Set(), showDetail = false;
let cachedCategories = null;

async function initCategories() {
  const grid = document.getElementById('category-grid');

  if (!cachedCategories) {
    try {
      cachedCategories = await getCategories();
    } catch (e) {
      grid.innerHTML = `<span class="cat-error">Failed to load categories: ${e.message}</span>`;
      return;
    }
  }

  renderCategoryGrid();
}

function renderCategoryGrid() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';

  if (!cachedCategories || cachedCategories.length === 0) {
    grid.innerHTML = '<span class="cat-status">No categories found.</span>';
    return;
  }

  cachedCategories.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'category-card';
    el.innerHTML = `
      <div class="cc-name">${cat.name}</div>
      <div class="cc-count">${cat.count} card${cat.count !== 1 ? 's' : ''}</div>`;
    el.addEventListener('click', () => enterCategory(cat.name));
    grid.appendChild(el);
  });
}

async function enterCategory(name) {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '<span class="cat-status">Loading…</span>';

  let cards;
  try {
    cards = await getQuestions(name);
  } catch (e) {
    renderCategoryGrid();
    grid.insertAdjacentHTML('beforeend', `<span class="cat-error">Failed to load: ${e.message}</span>`);
    return;
  }

  allCards = cards;
  filtered = [...allCards];
  index = 0;
  activeTopics = new Set();
  showDetail = false;

  document.getElementById('back-btn').classList.add('visible');
  const badge = document.getElementById('category-badge');
  badge.textContent = name;
  badge.classList.add('visible');
  document.getElementById('progress-wrap').style.display = 'flex';

  const allTags = [...new Set(allCards.flatMap(c => c.tags || []))].sort();
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = '';
  allTags.forEach(tag => {
    const chip = document.createElement('button');
    chip.className = 'topic-chip';
    chip.textContent = tag;
    chip.addEventListener('click', () => toggleTag(tag, chip));
    filterBar.appendChild(chip);
  });

  document.getElementById('category-screen').style.display = 'none';
  document.getElementById('card-screen').classList.add('visible');
  renderCard();
}

function goBack() {
  document.getElementById('card-screen').classList.remove('visible');
  document.getElementById('category-screen').style.display = 'flex';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('category-badge').classList.remove('visible');
  document.getElementById('progress-wrap').style.display = 'none';
  renderCategoryGrid();
}

function toggleTag(tag, chip) {
  activeTopics.has(tag) ? activeTopics.delete(tag) : activeTopics.add(tag);
  chip.classList.toggle('active');
  filtered = activeTopics.size === 0
    ? [...allCards]
    : allCards.filter(c => (c.tags || []).some(t => activeTopics.has(t)));
  index = 0;
  renderCard();
}

function renderCard() {
  const card = document.getElementById('card');
  const empty = document.getElementById('empty');
  showDetail = false;

  if (filtered.length === 0) {
    card.style.display = 'none';
    empty.style.display = 'flex';
    document.getElementById('prog-text').textContent = '0 / 0';
    document.getElementById('prog-fill').style.width = '0%';
    return;
  }

  card.style.display = 'grid';
  empty.style.display = 'none';

  const data = filtered[index];
  document.getElementById('q-body').textContent = data.topic;
  document.getElementById('a-body').textContent = data.shortDescription;
  document.getElementById('a-body').classList.add('blurred');
  document.getElementById('reveal-btn').style.display = '';
  document.getElementById('card-answer').classList.add('tap-to-reveal');
  document.getElementById('detail-btn').classList.remove('visible', 'active');
  document.getElementById('detail-btn').textContent = 'Show detail';

  const tagsEl = document.getElementById('q-tags');
  tagsEl.innerHTML = '';
  (data.tags || []).forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = t;
    tagsEl.appendChild(tag);
  });

  const n = filtered.length;
  document.getElementById('prog-text').textContent = `${index + 1} / ${n}`;
  document.getElementById('prog-fill').style.width = `${((index + 1) / n) * 100}%`;
  document.getElementById('prev-btn').disabled = index === 0;
  document.getElementById('next-btn').disabled = index === n - 1;

  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardIn 0.3s ease';
}

function reveal() {
  if (!document.getElementById('a-body').classList.contains('blurred')) return;
  document.getElementById('a-body').classList.remove('blurred');
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('card-answer').classList.remove('tap-to-reveal');
  if (filtered[index]?.longDescription) {
    document.getElementById('detail-btn').classList.add('visible');
  }
}

function toggleDetail() {
  const data = filtered[index];
  if (!data || !document.getElementById('detail-btn').classList.contains('visible')) return;
  showDetail = !showDetail;
  document.getElementById('a-body').textContent = showDetail ? data.longDescription : data.shortDescription;
  document.getElementById('detail-btn').classList.toggle('active', showDetail);
  document.getElementById('detail-btn').textContent = showDetail ? 'Hide detail' : 'Show detail';
}

function next() { if (index < filtered.length - 1) { index++; renderCard(); } }
function prev() { if (index > 0) { index--; renderCard(); } }

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  index = 0;
  renderCard();
}

document.getElementById('back-btn').addEventListener('click', goBack);
document.getElementById('reveal-btn').addEventListener('click', reveal);
document.getElementById('card-answer').addEventListener('click', reveal);
document.getElementById('detail-btn').addEventListener('click', e => { e.stopPropagation(); toggleDetail(); });
document.getElementById('next-btn').addEventListener('click', next);
document.getElementById('prev-btn').addEventListener('click', prev);
document.getElementById('shuffle-btn').addEventListener('click', shuffle);

let touchStartX = 0, touchStartY = 0;
document.getElementById('card').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) next(); else prev();
  }
}, { passive: true });

document.addEventListener('keydown', e => {
  if (!document.getElementById('card-screen').classList.contains('visible')) return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); reveal(); }
  else if (e.key === 'd' || e.key === 'D') toggleDetail();
  else if (e.key === 's' || e.key === 'S') shuffle();
});

initCategories();
</script>
</body>
</html>
